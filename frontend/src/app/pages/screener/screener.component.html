<div class="screener-container">
  <!-- Animated background -->
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <!-- Header -->
  <div class="screener-header animate-fade-in">
    <button class="back-btn" (click)="goBack()">
      <i class="pi pi-arrow-left"></i> Home
    </button>
    <h1 class="page-title">✦ AI Stock Screener</h1>
    <p class="page-subtitle">Ask Armand to find stocks using natural language</p>
  </div>

  <!-- Search Area -->
  <div class="search-section animate-fade-in-up">
    <div class="search-box">
      <i class="pi pi-search search-icon"></i>
      <input
        [(ngModel)]="query"
        placeholder="e.g., Show me undervalued tech stocks with a P/E under 20"
        class="screener-input"
        (keydown.enter)="search()"
      />
      <button class="screen-btn" (click)="search()" [disabled]="loading">
        <i class="pi pi-sparkles"></i> {{ loading ? 'Searching...' : 'Screen' }}
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="results-section">
    <app-loading-spinner text="Screening stocks..."></app-loading-spinner>
  </div>

  <!-- Results -->
  <div *ngIf="!loading && results" class="results-section animate-fade-in">
    <div class="results-header">
      <p class="summary-text">{{ results.summary }}</p>
      <button
        *ngIf="canCompare()"
        class="compare-selected-btn"
        (click)="compareSelected()"
      >
        <i class="pi pi-arrows-h"></i> Compare Selected
      </button>
    </div>

    <div *ngFor="let stock of results.results" class="result-card">
      <div class="result-item">
        <button
          class="select-btn"
          [class.selected]="isSelected(stock.ticker)"
          (click)="toggleSelection(stock.ticker); $event.stopPropagation()"
          [title]="isSelected(stock.ticker) ? 'Deselect' : 'Select for comparison'"
        >
          <i [class]="isSelected(stock.ticker) ? 'pi pi-check-circle' : 'pi pi-circle'"></i>
        </button>
        <div class="result-content" (click)="openDashboard(stock.ticker)">
          <span class="result-ticker">{{ stock.ticker }}</span>
          <span class="result-name">{{ stock.name }}</span>
          <span class="result-reason">{{ stock.reason }}</span>
          <i class="pi pi-arrow-right result-arrow"></i>
        </div>
      </div>
    </div>
  </div>
</div>
