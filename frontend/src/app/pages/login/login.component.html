<div class="login-page">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div class="login-card animate-fade-in-up">
    <button class="back-link" (click)="goBack()">← Back to ArmTrade</button>

    <div class="login-header">
      <span class="login-logo">✦</span>
      <h1>{{ isRegisterMode ? 'Create Account' : 'Welcome Back' }}</h1>
      <p>{{ isRegisterMode ? 'Join ArmTrade to unlock watchlists and personalized features' : 'Sign in to your ArmTrade account' }}</p>
    </div>

    <div class="login-form">
      <div class="form-group">
        <label>Username</label>
        <input pInputText [(ngModel)]="username" placeholder="Enter username" [style]="{'width':'100%'}" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input pInputText type="password" [(ngModel)]="password" placeholder="Enter password" [style]="{'width':'100%'}" (keyup.enter)="submit()" />
      </div>

      <div *ngIf="error" class="error-msg">{{ error }}</div>

      <p-button
        [label]="isRegisterMode ? 'Create Account' : 'Sign In'"
        icon="pi pi-sign-in"
        (onClick)="submit()"
        [loading]="loading"
        styleClass="login-btn"
        [style]="{'width':'100%'}"
      ></p-button>

      <div class="toggle-mode">
        <span *ngIf="!isRegisterMode">Don't have an account? <a (click)="toggleMode()">Register</a></span>
        <span *ngIf="isRegisterMode">Already have an account? <a (click)="toggleMode()">Sign In</a></span>
      </div>
    </div>
  </div>
</div>
